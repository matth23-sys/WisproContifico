<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Historial de Actualizaciones</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
  <div class="container py-5">
    <h2 class="text-center mb-4">🕒 Historial de Actualizaciones</h2>

    {% if data and data|length > 0 %}
    <table class="table table-bordered table-striped shadow-sm">
      <thead class="table-primary">
        <tr>
          <th>Origen</th>
          <th>Última actualización</th>
        </tr>
      </thead>
      <tbody>
        {% for row in data %}
        <tr>
          <td>{{ row[0] }}</td>
          <td>{{ row[1] }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <div class="alert alert-warning text-center">⚠️ No existen registros de actualización todavía.</div>
    {% endif %}

    <div class="text-center mt-4">
      <a href="/" class="btn btn-outline-dark">⬅️ Volver al Panel</a>
    </div>
  </div>
</body>
</html>
