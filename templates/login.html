<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Acceso Seguro | Dinamicred</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f5f6fa, #dfe6e9);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    form {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
    }
    h2 {
      color: #222;
      margin-bottom: 25px;
      font-size: 20px;
    }
    input {
      width: 100%;
      margin-bottom: 15px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #007bff;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #0056b3;
    }
    .msg {
      font-size: 14px;
      margin-top: 10px;
      padding: 8px;
      border-radius: 5px;
    }
    .msg.success { color: #155724; background: #d4edda; }
    .msg.danger  { color: #721c24; background: #f8d7da; }
    .msg.warning { color: #856404; background: #fff3cd; }
  </style>
</head>
<body>
  <form method="POST" action="{{ url_for('login') }}">
    <h2>🔐 Acceso Seguro</h2>

    <!-- Campos de ingreso -->
    <input type="text" name="username" placeholder="Usuario" required>
    <input type="password" name="password" placeholder="Contraseña" required>

    <button type="submit">Iniciar sesión</button>

    <!-- Mensajes flash -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="msg {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
  </form>
</body>
</html>
