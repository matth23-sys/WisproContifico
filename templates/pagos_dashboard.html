<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Dashboard de Pagos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
</head>
<body class="bg-light">

  <div class="container py-5">
    <h3 class="mb-4 text-center">📊 Dashboard de Pagos (Wispro)</h3>

    <table id="tabla" class="display table table-striped table-bordered align-middle" style="width:100%">
      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Estado</th>
          <th>Monto</th>
          <th>Cliente</th>
          <th>Fecha de Pago</th>
          <th>Código Transacción</th>
          <th>Tipo Transacción</th>
          <th>Facturas Asociadas</th>
        </tr>
      </thead>
      <tbody>
        {% for r in rows %}
        <tr>
          <td>{{ loop.index }}</td>
          <td>{{ r[1] }}</td>
          <td>${{ "%.2f"|format(r[2]) }}</td>
          <td>{{ r[3] }}</td>
          <td>{{ r[4] }}</td>
          <td>{{ r[5] }}</td>
          <td>{{ r[6] }}</td>
          <td>{{ r[7] }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <div class="text-center mt-3">
      <a class="btn btn-outline-primary" href="/">⬅️ Volver</a>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script>
    new DataTable('#tabla', {
      pageLength: 25,
      lengthMenu: [10, 25, 50, 100],
      order: [[4, 'desc']],
      language: {
        search: "Buscar:",
        lengthMenu: "Mostrar _MENU_ registros",
        info: "Mostrando _START_ a _END_ de _TOTAL_",
        paginate: { previous: "Anterior", next: "Siguiente" }
      }
    });
  </script>
</body>
</html>
