<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Procesando...</title>
  <meta http-equiv="refresh" content="300">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    .terminal {
      background: #111;
      color: #0f0;
      padding: 20px;
      border-radius: 10px;
      font-family: monospace;
      max-width: 700px;
      margin: 50px auto;
      height: 250px;
      overflow-y: auto;
    }
  </style>
</head>
<body class="bg-dark text-light">
  <div class="container text-center">
    <h2 class="mt-5">⏳ Ejecutando proceso Wispro → Desglose</h2>
    <p>Por favor, espera mientras se completan las operaciones...</p>

    <div id="log" class="terminal text-start">Inicializando proceso...</div>

    <div class="mt-4">
      <a href="/" class="btn btn-outline-light">⬅️ Volver</a>
      <a href="/pagos" class="btn btn-success">Ver Pagos Importados</a>
      <a href="/desgloses" class="btn btn-primary">Ver Desgloses</a>
    </div>
  </div>

<div id="log" class="terminal text-start bg-dark text-success border border-success"></div>

<script>
  async function actualizarEstado() {
    const res = await fetch('/estado_proceso');
    const data = await res.json();
    const log = document.getElementById('log');
    let color = "lime";
    if (data.fase.startsWith("🟡")) color = "yellow";
    if (data.fase.startsWith("❌")) color = "red";
    log.innerHTML = `
      <b style="color:${color}">Etapa:</b> ${data.fase}<br>
      <b>Detalle:</b> ${data.detalle}<br><br>
      Última actualización: ${new Date().toLocaleTimeString()}
    `;
  }
  setInterval(actualizarEstado, 2000);
  actualizarEstado();
</script>

</body>
</html>
